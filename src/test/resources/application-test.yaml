spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=CREATE SCHEMA IF NOT EXISTS user_service
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        default_schema:   # 메인 yaml의 user_service 오버라이드 — H2는 스키마 불필요

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379

# JWT keys not set → JwtConfig generates ephemeral key pair automatically
jwt:
  private-key:
  public-key:
  access-token-expiry-seconds: 1800
  refresh-token-expiry-seconds: 1209600

kakao:
  client-id: test-client-id
  client-secret: test-client-secret
  redirect-uri: http://localhost:8080/api/v1/auth/kakao/callback
  token-uri: https://kauth.kakao.com/oauth/token
  user-info-uri: https://kapi.kakao.com/v2/user/me
