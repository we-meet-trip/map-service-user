<!--
  visualizer.html — 추천 파이프라인 시각화 SPA

  본 페이지는 user-BFF 의 추천 파이프라인을 사람이 눈으로 확인하기 위한
  단일 페이지 애플리케이션(SPA)이다. Spring Boot 의 정적 리소스 경로
  (src/main/resources/static)에 위치하여 /visualizer.html 로 서빙된다.

  구성:
  - <style> : 페이지 전체 룩 앤 필 (한 화면에 모든 정보를 압축 표시)
  - <body>  : 추천 요청 폼 + 결과 표 + 통신 로그 영역
  - <script>: fetch API 로 BFF 호출, Long-poll 방식으로 결과 폴링

  대상 엔드포인트:
  - POST /api/v1/recommend                              : 추천 요청 등록
  - GET  /api/v1/recommend/{job_id}                     : 결과 폴링 (202/200/404/5xx)
  - POST /api/v1/recommend/{job_id}/research            : 재탐색 요청

  표시 데이터:
  - places       : 추천된 장소 목록 (place_id, name, address, lat/lng, 방문시간)
  - visit_order  : 방문 순서 (place_id 배열)
  - legs         : 이동 구간 (from/to/mode/거리/소요시간)
-->
<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>MAP 추천 파이프라인 시각화</title>
<!--
  <style> — 페이지 룩 앤 필
  - :root color-scheme : 라이트/다크 모두 지원
  - body / h1 / h2     : 전체 타이포 + 컴팩트한 여백
  - fieldset / legend  : 섹션 박스 (1. 요청 / 2. 결과 / 3. 로그)
  - input / select / button : 폼 요소 공통 스타일
  - .status            : 상단의 idle / in_progress / done / failed 칩
  - pre / table        : 원본 JSON 및 결과 테이블
  - .order-chip        : 방문 순서 번호 배지
  - #log / .log-*      : 통신 로그 패널
  - .result-grid       : 결과 영역의 2단 그리드 (좁은 화면에서는 1단으로 전환)
-->
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body { font-family: ui-sans-serif, -apple-system, "Apple SD Gothic Neo", sans-serif;
         margin: 0; padding: 10px 14px; max-width: 1400px; margin: 0 auto;
         font-size: 13px; line-height: 1.35; }
  h1 { font-size: 1.05rem; margin: 0 0 6px; }
  h2 { font-size: 0.82rem; margin: 6px 0 3px; text-transform: uppercase; letter-spacing: 0.02em; opacity: 0.75; }
  fieldset { border: 1px solid #aaa; border-radius: 6px; padding: 6px 10px 8px; margin: 0 0 8px; }
  legend { font-size: 0.78rem; padding: 0 6px; font-weight: 700; }
  label { display: inline-block; font-weight: 600; margin-right: 4px; font-size: 0.78rem; }
  input, select, textarea {
    font: inherit; padding: 2px 5px; border-radius: 4px; border: 1px solid #888;
    margin: 2px 4px 2px 0; font-size: 0.78rem;
  }
  input[type="date"], input[type="time"] { padding: 1px 3px; }
  input[type="number"] { width: 90px; }
  button { padding: 4px 10px; border-radius: 4px; border: 1px solid #333;
           background: #1466ff; color: white; cursor: pointer; font-size: 0.78rem; }
  button.secondary { background: #555; }
  button.danger { background: #c33; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .row + .row { margin-top: 3px; }
  .status { font-weight: 700; padding: 1px 8px; border-radius: 10px; display: inline-block; font-size: 0.7rem; }
  .status.in_progress { background: #ffd; color: #770; }
  .status.done { background: #cfc; color: #060; }
  .status.failed { background: #fcc; color: #900; }
  .status.idle { background: #ddd; color: #444; }
  pre { background: #1112; padding: 6px 8px; border-radius: 4px; overflow: auto;
        font-size: 0.7rem; max-height: 100px; margin: 2px 0; }
  table { width: 100%; border-collapse: collapse; font-size: 0.72rem; margin: 2px 0; }
  th, td { border: 1px solid #888; padding: 2px 5px; text-align: left; vertical-align: top; }
  th { background: #2222; font-size: 0.7rem; }
  .order-chip { display: inline-block; background: #1466ff; color: white;
                width: 18px; height: 18px; line-height: 18px;
                text-align: center; border-radius: 50%; margin-right: 3px;
                font-weight: 700; font-size: 0.66rem; }
  #order-list { font-size: 0.74rem; }
  #log { max-height: 90px; overflow: auto; background: #1112; padding: 4px 8px; border-radius: 4px;
         font-family: ui-monospace, monospace; font-size: 0.68rem; }
  .log-line { margin: 1px 0; }
  .log-time { color: #888; margin-right: 6px; }
  .result-grid { display: grid; grid-template-columns: 1.6fr 1fr; gap: 10px; align-items: start; }
  .col-narrow { min-width: 0; }
  #error-box { font-size: 0.78rem; margin: 2px 0 4px; }
  .meta-small { font-size: 0.72rem; }
  code { font-size: 0.72rem; }
  #places-table th:first-child, #places-table td:first-child { width: 22px; text-align: center; }
  #places-table th:nth-child(4), #places-table td:nth-child(4) { width: 92px; font-size: 0.66rem; white-space: nowrap; }
  #places-table td:nth-child(5) { font-size: 0.7rem; }
  @media (max-width: 900px) {
    .result-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<!--
  <body> — 화면 구조
  1. 추천 요청 : 광역시도/시군구/이동수단/기간/예산/테마 폼
                 - btn-submit : POST /api/v1/recommend
                 - btn-cancel : 폴링 중단
                 - btn-research: 재탐색 (현재 job_id 가 있을 때만 활성)
  2. 결과     : places 테이블, 방문 순서 칩 목록, legs 테이블, 원본 JSON
  3. 통신 로그: send / recv / poll / error / init 종류로 시각화
-->
<body>

<h1>MAP 추천 파이프라인 시각화 <span id="status" class="status idle">idle</span></h1>

<fieldset>
  <legend>1. 추천 요청</legend>
  <div class="row">
    <label>광역시도</label><input id="province" value="서울특별시" />
    <label>시군구</label><input id="city" value="동작구" />
    <label>이동수단</label>
    <select id="mobility">
      <option value="">(미지정)</option>
      <option value="walk" selected>walk</option>
      <option value="bicycle">bicycle</option>
      <option value="car">car</option>
      <option value="transit">transit</option>
    </select>
  </div>
  <div class="row">
    <label>시작일</label><input id="date_start" type="date" />
    <label>종료일</label><input id="date_end" type="date" />
    <label>시작시각</label><input id="time_start" type="time" value="10:00" />
    <label>종료시각</label><input id="time_end" type="time" value="20:00" />
  </div>
  <div class="row">
    <label>예산(KRW)</label><input id="budget" type="number" value="100000" />
    <label>테마(쉼표)</label><input id="theme" value="역사,맛집" style="min-width: 240px" />
  </div>
  <div class="row">
    <button id="btn-submit">추천 요청 보내기</button>
    <button id="btn-cancel" class="secondary" disabled>폴링 중단</button>
    <button id="btn-research" class="danger" disabled>재탐색</button>
    <span>job_id: <code id="job-id">-</code></span>
    <span>요청 수: <code id="poll-count">0</code></span>
  </div>
</fieldset>

<fieldset>
  <legend>2. 결과</legend>
  <div id="error-box" style="display:none; color: #c33; font-weight: 700;"></div>
  <div class="result-grid">
    <div class="col-narrow">
      <h2>장소 (places)</h2>
      <div id="places-empty" style="opacity: 0.6" class="meta-small">아직 결과가 없습니다.</div>
      <table id="places-table" style="display:none">
        <thead><tr><th>#</th><th>이름</th><th>주소</th><th>lat, lng</th><th>방문 시간</th></tr></thead>
        <tbody id="places-tbody"></tbody>
      </table>
    </div>
    <div class="col-narrow">
      <h2>방문 순서</h2>
      <div id="order-empty" style="opacity: 0.6" class="meta-small">-</div>
      <div id="order-list"></div>

      <h2>이동 구간 (legs)</h2>
      <div id="legs-empty" style="opacity: 0.6" class="meta-small">-</div>
      <table id="legs-table" style="display:none">
        <thead><tr><th>from</th><th>to</th><th>mode</th><th>km</th><th>분</th></tr></thead>
        <tbody id="legs-tbody"></tbody>
      </table>

      <h2>원본 JSON</h2>
      <pre id="raw-json">-</pre>
    </div>
  </div>
</fieldset>

<fieldset>
  <legend>3. 통신 로그</legend>
  <div id="log"></div>
</fieldset>

<!--
  <script> — 클라이언트 로직

  책임:
  - 폼 입력값을 BFF 요청 JSON 으로 빌드 (buildRequest)
  - 추천 요청 전송 후 setInterval 기반 폴링 시작 (submitRecommend / startPolling)
  - 폴링 결과 처리 (pollOnce):
      * 202 → in_progress 유지
      * 200 → 결과 렌더링 + 폴링 중단
      * 404 → 만료/미존재로 처리
      * 5xx → 실패 처리
  - 결과 렌더링 (renderResult):
      * places  : 테이블 행 생성
      * order   : place_id → name 매핑 후 순번 칩으로 표시
      * legs    : 이동 구간 테이블
  - 재탐색 (doResearch) : 새 job_id 로 폴링 재시작
  - 통신 로그 (log) : 상단 시각과 함께 #log 패널에 추가

  상수:
  - POLL_INTERVAL_MS : 폴링 주기 (3초)
  - POLL_MAX         : 최대 폴링 횟수 (50회, 약 2.5분)

  전역 상태:
  - pollTimer     : setInterval 핸들
  - pollCount     : 현재까지 폴링 횟수
  - currentJobId  : 현재 추적 중인 job_id
-->
<script>
const $ = (id) => document.getElementById(id);
const POLL_INTERVAL_MS = 3000;
const POLL_MAX = 50; // 약 2.5분

let pollTimer = null;
let pollCount = 0;
let currentJobId = null;

// 기본 날짜 = 오늘
(() => {
  const t = new Date();
  const iso = t.toISOString().slice(0, 10);
  $('date_start').value = iso;
  $('date_end').value = iso;
})();

function log(msg, kind = 'info') {
  const div = document.createElement('div');
  div.className = 'log-line';
  const time = new Date().toLocaleTimeString();
  div.innerHTML = `<span class="log-time">${time}</span><b>[${kind}]</b> ${escapeHtml(msg)}`;
  $('log').appendChild(div);
  $('log').scrollTop = $('log').scrollHeight;
}

function escapeHtml(s) {
  if (typeof s !== 'string') s = JSON.stringify(s);
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function setStatus(text) {
  const el = $('status');
  el.className = 'status ' + text;
  el.textContent = text;
}

function clearResult() {
  $('error-box').style.display = 'none';
  $('places-table').style.display = 'none';
  $('places-empty').style.display = '';
  $('places-tbody').innerHTML = '';
  $('order-list').textContent = '';
  $('order-empty').style.display = '';
  $('legs-table').style.display = 'none';
  $('legs-empty').style.display = '';
  $('legs-tbody').innerHTML = '';
  $('raw-json').textContent = '-';
}

function buildRequest() {
  const theme = $('theme').value.split(',').map(s => s.trim()).filter(Boolean);
  const mob = $('mobility').value || null;
  const budgetRaw = $('budget').value;
  return {
    date: {
      date_start: $('date_start').value,
      date_end: $('date_end').value,
      time_start: $('time_start').value + ':00',
      time_end: $('time_end').value + ':00',
    },
    budget: budgetRaw ? parseInt(budgetRaw, 10) : null,
    theme: theme.length ? theme : null,
    mobility: mob,
    province: $('province').value.trim(),
    city: $('city').value.trim(),
  };
}

async function submitRecommend() {
  clearResult();
  setStatus('in_progress');
  $('btn-submit').disabled = true;
  $('btn-cancel').disabled = false;
  $('btn-research').disabled = true;
  pollCount = 0;
  $('poll-count').textContent = pollCount;

  const body = buildRequest();
  log('POST /api/v1/recommend body=' + JSON.stringify(body), 'send');
  try {
    const r = await fetch('/api/v1/recommend', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    const text = await r.text();
    log(`response ${r.status} ${text.slice(0, 300)}`, 'recv');
    if (!r.ok) {
      setStatus('failed');
      $('error-box').style.display = '';
      $('error-box').textContent = `요청 실패: HTTP ${r.status} - ${text}`;
      $('btn-submit').disabled = false;
      $('btn-cancel').disabled = true;
      return;
    }
    const data = JSON.parse(text);
    currentJobId = data.job_id;
    $('job-id').textContent = currentJobId;
    $('btn-research').disabled = false;
    startPolling();
  } catch (e) {
    log('네트워크 오류: ' + e.message, 'error');
    setStatus('failed');
    $('error-box').style.display = '';
    $('error-box').textContent = '네트워크 오류: ' + e.message;
    $('btn-submit').disabled = false;
    $('btn-cancel').disabled = true;
  }
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(pollOnce, POLL_INTERVAL_MS);
  pollOnce(); // 즉시 1회
}

function stopPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = null;
  $('btn-submit').disabled = false;
  $('btn-cancel').disabled = true;
}

async function pollOnce() {
  if (!currentJobId) return;
  pollCount += 1;
  $('poll-count').textContent = pollCount;
  if (pollCount > POLL_MAX) {
    stopPolling();
    setStatus('failed');
    log('폴링 한도 초과', 'error');
    $('error-box').style.display = '';
    $('error-box').textContent = '폴링 한도 초과';
    return;
  }
  try {
    const r = await fetch('/api/v1/recommend/' + encodeURIComponent(currentJobId));
    log(`GET /recommend/{job_id} status=${r.status}`, 'poll');
    if (r.status === 202) {
      setStatus('in_progress');
      return;
    }
    if (r.status === 200) {
      const text = await r.text();
      const data = JSON.parse(text);
      stopPolling();
      renderResult(data, text);
      return;
    }
    if (r.status === 404) {
      stopPolling();
      setStatus('failed');
      $('error-box').style.display = '';
      $('error-box').textContent = '대상 추천을 찾을 수 없음 (만료/존재하지 않음)';
      return;
    }
    if (r.status >= 500) {
      stopPolling();
      setStatus('failed');
      const text = await r.text();
      $('error-box').style.display = '';
      $('error-box').textContent = `BFF/agent 오류 HTTP ${r.status}: ${text}`;
      return;
    }
  } catch (e) {
    log('폴링 네트워크 오류: ' + e.message, 'error');
  }
}

function renderResult(data, rawText) {
  $('raw-json').textContent = rawText;
  if (data.status === 'failed' || data.error) {
    setStatus('failed');
    $('error-box').style.display = '';
    $('error-box').textContent = 'agent failed: ' + (data.error || 'unknown');
    return;
  }
  setStatus('done');
  const places = data.places || [];
  const order = data.visit_order || [];
  const legs = data.legs || [];

  if (places.length) {
    $('places-empty').style.display = 'none';
    $('places-table').style.display = '';
    const tbody = $('places-tbody');
    tbody.innerHTML = '';
    places.forEach(p => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${p.place_id}</td><td>${escapeHtml(p.name)}</td>` +
        `<td>${escapeHtml(p.address)}</td>` +
        `<td>${p.lat?.toFixed(5)}, ${p.lng?.toFixed(5)}</td>` +
        `<td>${escapeHtml(p.recommended_visit_time || '-')}</td>`;
      tbody.appendChild(tr);
    });
  }
  if (order.length) {
    $('order-empty').style.display = 'none';
    const placeMap = Object.fromEntries(places.map(p => [p.place_id, p.name]));
    $('order-list').innerHTML = order.map((pid, idx) =>
      `<span class="order-chip">${idx + 1}</span>${escapeHtml(placeMap[pid] || ('#' + pid))}`
    ).join(' &rarr; ');
  }
  if (legs.length) {
    $('legs-empty').style.display = 'none';
    $('legs-table').style.display = '';
    const tbody = $('legs-tbody');
    tbody.innerHTML = '';
    legs.forEach(l => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${l.from}</td><td>${l.to}</td><td>${l.mode}</td>` +
        `<td>${(l.estimated_distance_km ?? 0).toFixed(2)}</td>` +
        `<td>${l.estimated_duration_min ?? 0}</td>`;
      tbody.appendChild(tr);
    });
  }
}

async function doResearch() {
  if (!currentJobId) return;
  const body = buildRequest();
  log('POST /research body=' + JSON.stringify(body), 'send');
  try {
    const r = await fetch('/api/v1/recommend/' + encodeURIComponent(currentJobId) + '/research', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    const text = await r.text();
    log(`research response ${r.status} ${text.slice(0, 200)}`, 'recv');
    if (!r.ok) return;
    const data = JSON.parse(text);
    currentJobId = data.job_id;
    $('job-id').textContent = currentJobId;
    clearResult();
    setStatus('in_progress');
    pollCount = 0;
    startPolling();
  } catch (e) {
    log('research 오류: ' + e.message, 'error');
  }
}

$('btn-submit').addEventListener('click', submitRecommend);
$('btn-cancel').addEventListener('click', () => { stopPolling(); setStatus('idle'); });
$('btn-research').addEventListener('click', doResearch);
log('visualizer 초기화 완료', 'init');
</script>
</body>
</html>
