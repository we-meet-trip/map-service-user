# =============================================================================
# gradle-wrapper.properties — Gradle Wrapper 다운로드/설치 설정
#
# 책임:
# - ./gradlew 실행 시 사용할 Gradle 배포본의 위치와 다운로드 정책을 정의한다.
# - 본 파일은 자동 생성되며 직접 수정은 권장되지 않는다.
#
# 키 설명:
# - distributionBase        : Gradle 배포본의 베이스 디렉토리 종류 (사용자 홈 등)
# - distributionPath        : 배포본을 풀어둘 상대 경로
# - distributionUrl         : 사용할 Gradle 배포본 URL
# - networkTimeout          : 다운로드 네트워크 타임아웃 (ms)
# - validateDistributionUrl : 배포본 URL 검증 활성화 여부
# - zipStoreBase            : 다운받은 zip 의 베이스 디렉토리 종류
# - zipStorePath            : zip 저장 상대 경로
# =============================================================================
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.12.1-bin.zip
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
